<svg viewBox="0 0 760 590" width="760" height="590" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc">
  <title id="ttl">IIS OP-GL monitor token-optimized flow</title>
  <desc id="desc">Graylog REST performs all detection and cross-stream correlation at zero tokens every 30 minutes. opus is used only for high-severity deep-dives (rare) and a once-daily completeness sweep.</desc>
  <style>
    /* self-contained light-theme values so the file renders standalone (deck/PNG) */
    svg{--color-text-primary:#1f2733;--color-text-secondary:#5a6672;--color-background-primary:#ffffff;--color-border-secondary:#d4dbe4}
    text{font-family:'Segoe UI',ui-sans-serif,system-ui,sans-serif;fill:var(--color-text-primary)}
    .s{fill:var(--color-text-secondary)}
    .box{fill:var(--color-background-primary);stroke:var(--color-border-secondary);stroke-width:1.5}
    .h{font-weight:700}
    .free{stroke:#1f7a3d}
    .ai{stroke:#b5791f}
    .lblF{fill:#1f7a3d;font-weight:700;letter-spacing:.4px}
    .lblA{fill:#b5791f;font-weight:700;letter-spacing:.4px}
    .arr{stroke:var(--color-text-secondary);stroke-width:1.6;fill:none}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5a6672"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="590" fill="#ffffff"/>

  <text x="380" y="26" text-anchor="middle" font-size="19" class="h">IIS OP-GL Monitor — where tokens go</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" class="s">All detection &amp; correlation is free; AI is a thin layer on top</text>

  <rect x="288" y="60" width="184" height="42" rx="10" class="box"/>
  <text x="380" y="78" text-anchor="middle" font-size="13" class="h">OP-GL Graylog</text>
  <text x="380" y="94" text-anchor="middle" font-size="10.5" class="s">IIS web logs · ~1M/hr</text>
  <line x1="380" y1="102" x2="380" y2="126" class="arr" marker-end="url(#a)"/>

  <rect x="34" y="130" width="692" height="132" rx="12" fill="none" class="free"/>
  <text x="50" y="150" font-size="11" class="lblF">GRAYLOG REST · 0 TOKENS · EVERY 30 MIN</text>
  <rect x="58" y="160" width="318" height="90" rx="10" class="box"/>
  <text x="217" y="186" text-anchor="middle" font-size="13" class="h">Detection — 18 checks</text>
  <text x="217" y="206" text-anchor="middle" font-size="10.5" class="s">SQLi · webshell · CVE/infra probes</text>
  <text x="217" y="222" text-anchor="middle" font-size="10.5" class="s">auth-storm · exfil · C2 · IDOR</text>
  <text x="217" y="240" text-anchor="middle" font-size="10" class="s">+ first-occurrence net (no-miss)</text>
  <rect x="384" y="160" width="318" height="90" rx="10" class="box"/>
  <text x="543" y="186" text-anchor="middle" font-size="13" class="h">Cross-stream correlation</text>
  <text x="543" y="206" text-anchor="middle" font-size="10.5" class="s">Windows · firewall · MFA</text>
  <text x="543" y="222" text-anchor="middle" font-size="10.5" class="s">SFTP · antivirus · email</text>
  <text x="543" y="240" text-anchor="middle" font-size="10" class="s">confirms a finding</text>

  <line x1="380" y1="262" x2="380" y2="280" class="arr" marker-end="url(#a)"/>
  <rect x="238" y="282" width="284" height="30" rx="15" fill="none" stroke="#5a6672" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="380" y="301" text-anchor="middle" font-size="11.5" class="h">HIGH = corroborated by ≥2 sources</text>
  <line x1="380" y1="312" x2="380" y2="330" class="arr" marker-end="url(#a)"/>

  <rect x="34" y="334" width="692" height="124" rx="12" fill="none" class="ai"/>
  <text x="50" y="354" font-size="11" class="lblA">opus · TOKENS · RARE</text>
  <rect x="58" y="364" width="318" height="80" rx="10" class="box"/>
  <text x="217" y="390" text-anchor="middle" font-size="13" class="h">HIGH deep-dive</text>
  <text x="217" y="410" text-anchor="middle" font-size="10.5" class="s">GitHub skill playbook applied</text>
  <text x="217" y="426" text-anchor="middle" font-size="10.5" class="s">≤ 2 per run · skill text capped</text>
  <rect x="384" y="364" width="318" height="80" rx="10" class="box"/>
  <text x="543" y="390" text-anchor="middle" font-size="13" class="h">Daily completeness sweep</text>
  <text x="543" y="410" text-anchor="middle" font-size="10.5" class="s">novel / unknown patterns</text>
  <text x="543" y="426" text-anchor="middle" font-size="10.5" class="s">1× / day · the backstop</text>

  <line x1="380" y1="458" x2="380" y2="478" class="arr" marker-end="url(#a)"/>
  <rect x="286" y="480" width="188" height="40" rx="10" class="box"/>
  <text x="380" y="505" text-anchor="middle" font-size="12.5" class="h">Microsoft Teams card</text>

  <rect x="150" y="548" width="14" height="14" rx="3" fill="none" class="free"/>
  <text x="171" y="559" font-size="11" class="s">Graylog REST — 0 tokens (does the maximum)</text>
  <rect x="470" y="548" width="14" height="14" rx="3" fill="none" class="ai"/>
  <text x="491" y="559" font-size="11" class="s">opus — tokens, rare only</text>
</svg>
